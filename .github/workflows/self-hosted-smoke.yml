name: Self Hosted Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show environment
        run: |
          echo "runner=$(uname -a)"
          xcode-select -p
          swift --version

      - name: Generate Xcode project
        run: ./Scripts/generate_xcodeproj.sh

      - name: Run tests
        run: |
          xcodebuild test \
            -project better-auth-swift.xcodeproj \
            -scheme BetterAuth-Package \
            -destination 'platform=macOS,arch=arm64'
