name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-spm:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Show Swift version
        run: swift --version

      - name: Run SPM tests (all targets)
        run: ./Scripts/swift_test_wrapper.sh

  release:
    needs: validate-spm
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Show Swift version
        run: swift --version

      - name: Generate Xcode project
        run: ./Scripts/generate_xcodeproj.sh

      - name: Run Xcode tests
        run: |
          xcodebuild test \
            -project better-auth-swift.xcodeproj \
            -scheme BetterAuth-Package \
            -destination 'platform=macOS,arch=arm64'

      - name: Build xcframework release artifacts
        run: ./Scripts/build_xcframeworks.sh ./release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/BetterAuth.xcframework.zip
            release-artifacts/BetterAuthSwiftUI.xcframework.zip
            release-artifacts/BetterAuthOrganization.xcframework.zip
