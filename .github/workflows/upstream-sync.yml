name: Upstream Sync Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 10

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4

      - name: Clone upstream better-auth
        run: git clone --depth 1 https://github.com/better-auth/better-auth.git /tmp/better-auth

      - name: Extract endpoints
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          ./Scripts/extract_upstream_endpoints.sh /tmp/better-auth > /tmp/upstream.txt
          ./Scripts/extract_sdk_endpoints.sh > /tmp/sdk.txt

      - name: Compute diff
        id: drift
        run: |
          DIFF=$(comm -23 /tmp/upstream.txt /tmp/sdk.txt)
          REMOVED=$(comm -13 /tmp/upstream.txt /tmp/sdk.txt)

          if [ -z "$DIFF" ] && [ -z "$REMOVED" ]; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "No contract drift detected."
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            echo "$DIFF" > /tmp/diff.txt
            echo "$REMOVED" > /tmp/removed.txt

            echo "Drift detected: $(wc -l < /tmp/diff.txt) new upstream endpoints"
          fi

      - name: Build drift report
        if: steps.drift.outputs.has_drift == 'true'
        run: |
          {
            echo "## Contract Drift Report"
            echo
            echo "### New upstream endpoints not in SDK"
            echo '```'
            cat /tmp/diff.txt
            echo '```'
            echo
            echo "### SDK endpoints not found upstream"
            echo '```'
            cat /tmp/removed.txt
            echo '```'
          } > /tmp/analysis.txt

      - name: Create or update issue
        if: steps.drift.outputs.has_drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label upstream-sync --state open --json number -q '.[].number' 2>/dev/null || true)
          for num in $EXISTING; do
            gh issue close "$num" --comment "Superseded by new drift check."
          done

          gh issue create \
            --title "Upstream sync: contract drift detected ($(date +%Y-%m-%d))" \
            --body-file /tmp/analysis.txt \
            --label upstream-sync
