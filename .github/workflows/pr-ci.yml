name: PR CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show environment
        run: |
          echo "runner=$(uname -a)"
          xcode-select -p
          swift --version
          tuist version

      - name: Generate Xcode project
        run: ./Scripts/generate_xcodeproj.sh

      - name: Run SPM tests
        run: ./Scripts/swift_test_wrapper.sh

      - name: Run Xcode tests
        run: |
          xcodebuild test \
            -project better-auth-swift.xcodeproj \
            -scheme BetterAuth-Package \
            -destination 'platform=macOS,arch=arm64'
