name: PR CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show environment
        run: |
          echo "runner=$(uname -a)"
          xcode-select -p
          swift --version
          xcodegen --version

      - name: Generate Xcode project
        run: ./Scripts/generate_xcodeproj.sh

      - name: Run SPM tests
        shell: bash
        run: |
          set -o pipefail
          swift test --enable-swift-testing 2>&1 | tee /tmp/swift-test.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            filtered_log=$(mktemp)
            grep -v "CoreData: error: Failed to create NSXPCConnection" /tmp/swift-test.log > "$filtered_log" || true

            if grep -q "✔ Test " "$filtered_log" && ! grep -Eq "(^|[[:space:]])(✘ Test |Test .* failed|error:|Issue recorded|caught unexpected signal)" "$filtered_log"; then
              echo "Ignoring known Swift Testing non-zero exit because all visible tests passed."
              exit 0
            fi
            exit "$status"
          fi
