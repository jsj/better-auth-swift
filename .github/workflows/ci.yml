name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-spm:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          echo "runner=$(uname -a)"
          xcode-select -p
          swift --version

      - name: Run package tests
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          swift test --disable-xctest --enable-swift-testing

      - name: Run SwiftFormat lint
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          swiftformat . --lint --config .swiftformat

      - name: Run SwiftLint
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          swiftlint --config .swiftlint.yml --strict

  validate-xcode:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          echo "runner=$(uname -a)"
          xcode-select -p
          swift --version
          tuist version

      - name: Generate Xcode project
        run: ./Scripts/generate_xcodeproj.sh

      - name: Verify generated Xcode project is committed
        run: git diff --exit-code -- better-auth-swift.xcodeproj/project.pbxproj

      - name: Run Xcode tests
        run: |
          source ./Scripts/bootstrap_runner_env.sh
          xcodebuild test \
            -project better-auth-swift.xcodeproj \
            -scheme BetterAuth-Package \
            -destination 'platform=macOS,arch=arm64'
