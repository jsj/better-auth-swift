name: Xcode Cloud Status

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xcode-cloud-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 25

    steps:
      - name: Preflight checks
        env:
          XC: xc
          WORKFLOW_ID: ${{ vars.XCODE_CLOUD_WORKFLOW_ID }}
        run: |
          set -euo pipefail
          command -v "$XC" >/dev/null 2>&1 || { echo "::error::xc CLI is not installed"; exit 1; }
          command -v python3 >/dev/null 2>&1 || { echo "::error::python3 is not installed"; exit 1; }
          test -n "$WORKFLOW_ID" || { echo "::error::XCODE_CLOUD_WORKFLOW_ID is not configured"; exit 1; }

      - name: Trigger and poll Xcode Cloud build
        env:
          XC: xc
          WORKFLOW_ID: ${{ vars.XCODE_CLOUD_WORKFLOW_ID }}
        run: |
          set -euo pipefail
          command -v "$XC" >/dev/null 2>&1
          command -v python3 >/dev/null 2>&1

          "$XC" ci cloud trigger \
            --workflow-id "$WORKFLOW_ID" \
            --ref main \
            --json \
          | tee /tmp/xc-trigger.ndjson

          RUN_ID=$(python3 -c "
          import json, sys
          for line in open('/tmp/xc-trigger.ndjson'):
              d = json.loads(line)
              if d.get('event') == 'xcode_cloud_status':
                  print(d['payload']['run_id']); sys.exit(0)
          sys.exit(1)
          ")

          echo "Polling Xcode Cloud run: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          "$XC" ci cloud poll \
            --run-id "$RUN_ID" \
            --timeout-seconds 1200 \
            --interval-seconds 15 \
            --json \
          | tee /tmp/xc-poll.ndjson

      - name: Publish workflow summary
        if: always()
        run: |
          command -v python3 >/dev/null 2>&1
          python3 - <<'PY'
          import json, os, pathlib

          lines = [
              '# Xcode Cloud status run',
              '',
              f'- Workflow ID: `{os.environ.get("WORKFLOW_ID", "")}`',
              f'- Run ID: `{os.environ.get("RUN_ID", "unavailable")}`',
              ''
          ]

          poll_path = pathlib.Path('/tmp/xc-poll.ndjson')
          if poll_path.exists():
              final_payload = None
              for line in poll_path.read_text().splitlines():
                  try:
                      data = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if data.get('event') == 'xcode_cloud_status':
                      final_payload = data.get('payload', final_payload)

              if final_payload:
                  for key in ('status', 'result', 'workflow_name', 'branch'):
                      value = final_payload.get(key)
                      if value:
                          lines.append(f'- {key.replace("_", " ").title()}: `{value}`')
              else:
                  lines.append('- Poll output captured but no final payload was parsed')
          else:
              lines.append('- Poll output was not captured')

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          content = '\n'.join(lines) + '\n'
          if summary:
              pathlib.Path(summary).write_text(content)
          else:
              print(content)
          PY
