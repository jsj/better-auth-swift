name: Xcode Cloud Status

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xcode-cloud-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: [self-hosted, macOS, ARM64, mac-ci]
    timeout-minutes: 25

    steps:
      - name: Trigger and poll Xcode Cloud build
        run: |
          xc ci cloud trigger \
            --workflow-id "${{ vars.XCODE_CLOUD_WORKFLOW_ID }}" \
            --ref main \
            --json \
          | tee /tmp/xc-trigger.ndjson

          RUN_ID=$(/opt/homebrew/bin/python3 -c "
          import json, sys
          for line in open('/tmp/xc-trigger.ndjson'):
              d = json.loads(line)
              if d.get('event') == 'xcode_cloud_status':
                  print(d['payload']['run_id']); sys.exit(0)
          sys.exit(1)
          ")

          echo "Polling Xcode Cloud run: $RUN_ID"
          xc ci cloud poll \
            --run-id "$RUN_ID" \
            --timeout-seconds 1200 \
            --interval-seconds 15 \
            --json
