included:
  - Sources
  - Tests
  - examples

excluded:
  - .build
  - Derived
  - SPECS
  - docs
  - better-auth-swift.xcodeproj

opt_in_rules:
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

analyzer_rules:
  - unused_declaration
  - unused_import

line_length:
  warning: 160
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true
  ignores_interpolated_strings: true
  ignores_multiline_strings: true

opening_brace:
  ignore_multiline_type_headers: true
  ignore_multiline_statement_conditions: true
  ignore_multiline_function_signatures: true

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - x
    - y

function_body_length:
  warning: 220
  error: 300

cyclomatic_complexity:
  warning: 40
  error: 60

type_body_length:
  warning: 600
  error: 800

file_length:
  warning: 600
  error: 900
  ignore_comment_only_lines: true
